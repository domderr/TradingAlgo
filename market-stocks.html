<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradingAlgo Mosaic | Market Stocks</title>
  <style>
    :root {
      --bg: #071423;
      --panel: rgba(255,255,255,0.075);
      --text: #f4f7fb;
      --muted: #aebbd0;
      --blue: #4aa3ff;
      --green: #42d392;
      --border: rgba(255,255,255,0.16);
      --shadow: 0 24px 70px rgba(0,0,0,0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 0%, rgba(74,163,255,0.22), transparent 28%),
        radial-gradient(circle at 82% 8%, rgba(66,211,146,0.16), transparent 30%),
        linear-gradient(180deg, var(--bg), #050b14 74%);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    .nav,
    main {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .nav {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 21px;
      font-weight: 850;
    }

    .logo-grid {
      width: 32px;
      height: 32px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .logo-grid span {
      border-radius: 4px;
      background: var(--blue);
    }

    .logo-grid span:nth-child(2),
    .logo-grid span:nth-child(6),
    .logo-grid span:nth-child(8) {
      background: var(--green);
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .nav-links a {
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: #edf5ff;
      font-weight: 750;
      font-size: 14px;
    }

    main { padding: 34px 0 68px; }

    .hero {
      margin-bottom: 28px;
      padding: 30px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.055));
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 0.96;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    .table-shell {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.06);
    }

    tbody tr:hover { background: rgba(255,255,255,0.055); }
    tbody tr:last-child td { border-bottom: 0; }

    .ticker {
      color: var(--green);
      font-weight: 900;
      white-space: nowrap;
    }

    .loading,
    .error {
      padding: 22px;
      color: var(--muted);
      font-size: 17px;
    }

    .error { color: #ffb4b4; }

    @media (max-width: 720px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
        padding: 18px 0;
      }

      .table-shell { overflow-x: auto; }
      table { min-width: 760px; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="brand" href="index.html">
      <span class="logo-grid" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </span>
      TradingAlgo Mosaic
    </a>
    <nav class="nav-links" aria-label="Market navigation">
      <a href="index.html#mission">Mission</a>
      <a href="faq.html">FAQ</a>
      <a href="index.html#mosaic">Mosaic</a>
      <a href="index.html#consulting">Consulting</a>
      <a href="publications.html">Publications</a>
      <a href="index.html#about">About</a>
      <a href="https://gandalfproject.com/gandalf-symposium-2026-html/">Gandalf Symposium</a>
      <a href="framework.html">Framework</a>
      <a href="reserved-area.html">Reserved Area</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1 id="page-title">Market Stocks</h1>
      <p class="meta" id="page-meta">Loading market data...</p>
    </section>

    <section class="table-shell" aria-label="Market stock detail">
      <div class="loading" id="loading">Loading stocks...</div>
      <table id="stocks-table" hidden>
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Name</th>
            <th>Sector</th>
            <th>Industry</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="assets/market-stocks-data.js"></script>
  <script>
    var markets = {
      Australia50: { label: "Australia50", folder: "Australia50", etf: "EWA" },
      Canada50: { label: "Canada50", folder: "Canada50", etf: "EWC" },
      DJ30: { label: "DJ30", folder: "DJ30", etf: "DIA" },
      Europe50: { label: "Europe50", folder: "Europe50", etf: "EZU" },
      France40: { label: "France40", folder: "France40", etf: "EWQ" },
      Germany30: { label: "Germany30", folder: "Germany30", etf: "EWG" },
      Italy30: { label: "Italy30", folder: "Italy30", etf: "EWI" },
      Japan50: { label: "Japan50", folder: "Japan50", etf: "EWJ" },
      Mexico30: { label: "Mexico30", folder: "Mexico30", etf: "EWW" },
      NASDAQ100: { label: "NASDAQ100", folder: "NASDAQ100", etf: "QQQ" },
      South_Africa30: { label: "South Africa30", folder: "South_Africa30", etf: "EZA" },
      South_Korea30: { label: "South Korea30", folder: "South_Korea30", etf: "EWY" },
      Spain40: { label: "Spain40", folder: "Spain40", etf: "EWP" },
      UK30: { label: "UK30", folder: "UK30", etf: "EWU" },
      USA100: { label: "USA100", folder: "USA100", etf: "SPY" }
    };

    function text(node) {
      return node ? node.textContent.trim() : "";
    }

    function showError(message) {
      var loading = document.getElementById("loading");
      loading.className = "error";
      loading.textContent = message;
    }

    async function loadStocks() {
      var key = new URLSearchParams(window.location.search).get("market") || "USA100";
      var market = markets[key];
      if (!market) {
        showError("Market not found.");
        return;
      }

      document.title = "TradingAlgo Mosaic | " + market.label + " Stocks";
      document.getElementById("page-title").textContent = market.label + " Stocks";
      document.getElementById("page-meta").textContent = "ETF: " + market.etf;

      var embeddedRows = window.MARKET_STOCKS_DATA && window.MARKET_STOCKS_DATA[market.folder];
      if (Array.isArray(embeddedRows) && embeddedRows.length) {
        renderRows(embeddedRows.map(function(item) {
          return [item.ticker, item.name, item.sector, item.industry];
        }));
        return;
      }

      try {
        var response = await fetch("reports_html/" + market.folder + "/all-assets.html");
        if (!response.ok) throw new Error("HTTP " + response.status);
        var html = await response.text();
        var doc = new DOMParser().parseFromString(html, "text/html");
        var rows = Array.from(doc.querySelectorAll(".gallery-table tbody tr"));
        renderRows(rows.map(function (row) {
          var cells = row.querySelectorAll("td");
          if (cells.length < 4) return null;
          return [text(cells[0]), text(cells[1]), text(cells[2]), text(cells[3])];
        }).filter(Boolean));
      } catch (error) {
        showError("Unable to load stocks for this market.");
      }
    }

    function renderRows(rows) {
      var tbody = document.querySelector("#stocks-table tbody");
      tbody.innerHTML = "";

      rows.forEach(function (cells) {
        var tr = document.createElement("tr");
        cells.forEach(function (value, index) {
          var td = document.createElement("td");
          td.textContent = value;
          if (index === 0) td.className = "ticker";
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      document.getElementById("loading").hidden = true;
      document.getElementById("stocks-table").hidden = false;
    }

    loadStocks();
  </script>
</body>
</html>
