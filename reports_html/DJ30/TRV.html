<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRV | DJ30 Asset Chart</title>
  <link rel="stylesheet" href="report.css" />
</head>
<body>
  <main class="asset-shell">
    <nav class="top-actions">
      <a href="Report_DJ30.html">Back to Report</a>
      <a href="all-assets.html">View All Benchmark Assets</a>
      <span class="subscriber-id" data-subscriber-id>ID: User</span>
    </nav>
    <section class="report-page asset-page">
      <p class="eyebrow">DJ30 Asset Detail</p>
      <h1>TRV</h1>
      <picture class="asset-picture">
        <img class="asset-chart" src="assets/TRV_asset_dashboard.png" alt="TRV asset dashboard" />
      </picture>
    </section>
  </main>
  <script>
    (function () {
      try {
        var stored = JSON.parse(sessionStorage.getItem("ta_reserved_authorized_markets") || "{}");
        var name = stored.first_name || "User";
        var target = document.querySelector("[data-subscriber-id]");
        if (target) target.textContent = "ID: " + name;
      } catch (error) {}
    }());
  </script>
  <script defer src="../../assets/access-analytics.js"></script>
</body>
</html>
